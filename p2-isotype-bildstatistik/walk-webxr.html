<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>P2 — Walk the Bildstatistik (WebXR + browser fallback)</title>
<!--
  P2 WALK-THROUGH in WebXR — the statistics as TERRAIN, not a sheet. The ISOTYPE
  apparatus of the 14 May 1933 rally placed at 1:1 across a schematic Schönbrunn
  parterre, so you walk THROUGH the data (and through its blank) instead of reading
  a panel. This is the WebXR sibling of walk.html (desktop first-person WebGL); the
  scene layout is ported verbatim. DUAL MODE, like p1/p2 webxr.html:
    • Android + Chrome (ARCore): tap "Start AR", point at the ground, tap to place;
      then physically WALK among the apparatus at true 1:1 scale.
    • Any other browser: orbit preview (drag to look, scroll/pinch to zoom).

  Honesty (index.html + BRIEF.md): one pictogram = one VERIFIED thing; machinery not
  magnitude; attendance on 14 May is a DELIBERATE BLANK you walk through; the 10 Sept
  1933 Mass is a clearly-labelled DIFFERENT EVENT (its ~300k crowd is shown as machinery
  — 48 loudspeakers + a sampled crowd field at 1 figure = 10,000 — NOT a literal mass).
  SCHEMATIC layout, not surveyed coordinates: real on-site placement at true positions
  needs geo-anchoring (AR.js location-based or prat-ar + Google Geospatial), the open
  stack decision in notes/stack-decision-memo.md. Tap-to-place, not geo-anchored.
-->
<style>
  html,body{margin:0;height:100%;background:#47503c;color:#e9e3d5;font:14px/1.5 -apple-system,system-ui,sans-serif;overflow:hidden}
  #overlay{position:fixed;inset:0;pointer-events:none;z-index:5}
  #panel{position:absolute;left:12px;right:12px;top:12px;background:rgba(20,18,16,.66);padding:10px 12px;border-radius:8px}
  #panel b{color:#f3d9b0}
  #hint{position:absolute;left:12px;right:12px;bottom:92px;text-align:center;background:rgba(20,18,16,.6);padding:8px 12px;border-radius:8px}
  #septBtn{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;display:none;pointer-events:auto;
           background:#5d7382;color:#e9e3d5;border:none;border-radius:6px;padding:10px 16px;font:600 14px system-ui}
  #note{position:absolute;left:12px;right:12px;bottom:12px;text-align:center;font-size:11.5px;color:#cdd3c4;background:rgba(20,18,16,.5);padding:6px 12px;border-radius:8px}
  .warn{color:#ffc266}
</style>
</head>
<body>
<div id="overlay">
  <div id="panel"><b>Walk the Bildstatistik</b> — <span id="msg">loading…</span></div>
  <button id="septBtn">＋ Sept 1933 contrast</button>
  <div id="hint" hidden>Point at the ground, tap to place the parterre at 1:1. Then walk through it.</div>
  <div id="note">Schematic layout — conveys the walk-through, not surveyed coordinates. Real placement needs geo-anchoring.</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "../libs/three/three.module.js",
  "three/addons/": "../libs/three/addons/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const msg=document.getElementById('msg'), hint=document.getElementById('hint'), overlay=document.getElementById('overlay'), septBtn=document.getElementById('septBtn');
const PAPER='#e9e3d5', BRICK='#9b3a2e', STEEL='#5d7382', GHOST='#b3ab99';
const deg=d=>d*Math.PI/180;

// pictogram glyphs — same ISOTYPE set as walk.html / webxr.html
const SYM={
  person:['<circle cx="10" cy="5" r="4.4"/><path d="M10 10C5.5 10 4 13 4 18L4 30 7.5 30 7.5 21 12.5 21 12.5 30 16 30 16 18C16 13 14.5 10 10 10Z"/>',20,30],
  mic:['<rect x="6" y="2" width="8" height="13" rx="4"/><rect x="9.2" y="15" width="1.6" height="9"/><rect x="4" y="24" width="12" height="2.4" rx="1.2"/>',20,30],
  truck:['<path d="M2 6 24 6 24 21 2 21Z"/><path d="M24 11 31 11 36 16 36 21 24 21Z"/><circle cx="9" cy="24" r="3.6"/><circle cx="30" cy="24" r="3.6"/>',38,30],
  speaker:['<path d="M3 11 9 11 18 4 18 26 9 19 3 19Z"/><path d="M20 9Q24 15 20 21" fill="none" stroke="currentColor" stroke-width="1.6"/>',24,30],
};

let renderer, scene, camera, controls, grid, reticle, controller;
let hitTestSource=null, hitTestSourceRequested=false;
let placedAR=null, browserContent=null, septGroup=null;

function pageBG(v){ document.documentElement.style.background=v; document.body.style.background=v; }

init();

async function init(){
  scene=new THREE.Scene();
  // far plane pushed out — the parterre runs ~45 m deep
  camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 300);
  camera.position.set(0,7,16);           // browser overview, looking down the parterre toward -Z
  scene.add(new THREE.HemisphereLight(0xffffff,0x99a,1.4));

  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(devicePixelRatio); renderer.setSize(innerWidth,innerHeight); renderer.xr.enabled=true;
  renderer.setClearColor(0x000000, 0);   // transparent canvas so the AR camera shows through
  document.body.appendChild(renderer.domElement);

  controls=new OrbitControls(camera, renderer.domElement);
  controls.target.set(0,1,-20); controls.enableDamping=true; controls.update();

  grid=new THREE.GridHelper(120,120,0x6b5d44,0x342d22); scene.add(grid);

  const ring=new THREE.RingGeometry(0.07,0.09,32).rotateX(-Math.PI/2);
  reticle=new THREE.Mesh(ring,new THREE.MeshBasicMaterial({color:0x9b3a2e}));
  reticle.matrixAutoUpdate=false; reticle.visible=false; scene.add(reticle);

  controller=renderer.xr.getController(0); controller.addEventListener('select',onSelect); scene.add(controller);
  septBtn.addEventListener('click',toggleSept);

  let arOK=false;
  if('xr' in navigator){ try{ arOK=await navigator.xr.isSessionSupported('immersive-ar'); }catch{} }
  if(arOK){
    document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:overlay}}));
    msg.innerHTML='browser preview below — or tap <b>Start AR</b> (Android) and walk through it.';
  } else {
    msg.innerHTML='<span class="warn">No WebXR AR here</span> — browser preview (drag to look, scroll to zoom). Real walk-through needs Android + Chrome.';
  }

  enterBrowser();
  renderer.xr.addEventListener('sessionstart', enterAR);
  renderer.xr.addEventListener('sessionend', enterBrowser);
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  renderer.setAnimationLoop(render);
}

function enterBrowser(){
  if(placedAR){ scene.remove(placedAR); placedAR=null; }
  reticle.visible=false; grid.visible=true; controls.enabled=true; hint.hidden=true; septGroup=null;
  pageBG('');                              // restore opaque page background for the browser preview
  if(!browserContent){ browserContent=makeTerrain(); browserContent.position.set(0,0,0); scene.add(browserContent); }
  septBtn.style.display='block'; septBtn.textContent='＋ Sept 1933 contrast';
}
function enterAR(){
  if(browserContent){ scene.remove(browserContent); browserContent=null; }
  grid.visible=false; controls.enabled=false; hint.hidden=false; septGroup=null;
  pageBG('transparent');                   // let the AR camera show through
  septBtn.style.display='none'; septBtn.textContent='＋ Sept 1933 contrast';
  msg.textContent='AR active — point at the ground, tap to place the parterre at 1:1.';
}

function pictoSprite(symKey,color,heightM,opacity=1){
  const [inner,w,h]=SYM[symKey];
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w*8}" height="${h*8}" viewBox="0 0 ${w} ${h}" fill="${color}" color="${color}">${inner}</svg>`;
  const tex=new THREE.Texture(); tex.colorSpace=THREE.SRGBColorSpace;
  const img=new Image(); img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);tex.image=c;tex.needsUpdate=true;};
  img.src='data:image/svg+xml;base64,'+btoa(svg);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity,depthWrite:false}));
  sp.scale.set(heightM*w/h,heightM,1); return sp;
}
function labelSprite(text,heightM=0.4,fg='#e9e3d5',bg='rgba(20,18,16,.82)'){
  const f=44,pad=18,c=document.createElement('canvas'),x=c.getContext('2d');
  x.font=`600 ${f}px Helvetica,Arial,sans-serif`;
  const w=Math.ceil(x.measureText(text).width)+pad*2,h=f+pad*2; c.width=w;c.height=h;
  x.font=`600 ${f}px Helvetica,Arial,sans-serif`; x.fillStyle=bg; rr(x,0,0,w,h,14); x.fill();
  x.fillStyle=fg; x.textBaseline='middle'; x.fillText(text,pad,h/2+2);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(heightM*w/h,heightM,1); return sp;
}
function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
// place a sprite with its FOOT on the ground: a centred sprite of height h sits at y=h/2
function foot(o,x,z,h){o.position.set(x,h/2,z);return o;}
function at(o,x,y,z){o.position.set(x,y,z);return o;}

// ── 14 May 1933 — the verified apparatus only, laid out at 1:1 (metres). Ported from walk.html. ──
function makeTerrain(){
  const g=new THREE.Group();
  // 6 microphones in a semicircle on the terrace (z≈-9), facing the parterre
  for(let i=0;i<6;i++){ const a=deg(-50+i*20); g.add(foot(pictoSprite('mic',BRICK,1.7), Math.sin(a)*3.2, -9+Math.cos(a)*0.6, 1.7)); }
  // presumed central speaker pair flanking the terrace (faded — undocumented)
  g.add(foot(pictoSprite('speaker',GHOST,1.4,0.5), -6,-9.5,1.4));
  g.add(foot(pictoSprite('speaker',GHOST,1.4,0.5),  6,-9.5,1.4));
  // recording / sound trucks out in the parterre
  g.add(foot(pictoSprite('truck',BRICK,2.4), -12,-26,2.4));
  g.add(foot(pictoSprite('truck',BRICK,2.4),  10,-34,2.4));
  g.add(foot(pictoSprite('truck',BRICK,2.4),  -2,-44,2.4));
  // labels
  g.add(at(labelSprite('Terrace — 6 microphones (verified)',0.9,'#f3d9b0','rgba(155,58,46,.85)'),0,2.6,-11));
  g.add(at(labelSprite('Attendance, 14 May — not counted',1.0,'#2a2723','rgba(243,217,176,.92)'),0,3.3,-30));
  g.add(at(labelSprite('you walk through the absence',0.7,'#f3d9b0','rgba(20,18,16,.7)'),0,2.5,-30));
  return g;
}

// ── + 10 Sept 1933 contrast (DIFFERENT EVENT) — 48 loudspeakers + sampled crowd field. ──
function makeSept(){
  const g=new THREE.Group();
  // 48 distributed loudspeakers in two avenue rows down the parterre
  for(let i=0;i<24;i++){ const z=-8-i*2.6; g.add(foot(pictoSprite('speaker',STEEL,1.0), -13,z,1.0)); g.add(foot(pictoSprite('speaker',STEEL,1.0), 13,z,1.0)); }
  // crowd field — sampled, 1 figure = 10,000 (machinery of magnitude, not a literal mass)
  for(let i=0;i<30;i++){ const r=2+Math.floor(i/6); g.add(foot(pictoSprite('person',STEEL,1.7), -7+(i%6)*2.6, -16-r*3.4, 1.7)); }
  g.add(at(labelSprite('10 Sept 1933 — DIFFERENT EVENT',1.0,'#e9e3d5','rgba(93,115,130,.92)'),0,3.4,-14));
  g.add(at(labelSprite('48 loudspeakers · crowd field 1 figure = 10,000',0.8,'#e9e3d5','rgba(93,115,130,.82)'),0,2.6,-14));
  return g;
}

function onSelect(){
  if(placedAR || !reticle.visible) return;
  placedAR=makeTerrain();
  placedAR.position.setFromMatrixPosition(reticle.matrix);
  placedAR.rotation.y=new THREE.Euler().setFromRotationMatrix(reticle.matrix).y;
  scene.add(placedAR);
  hint.textContent='Placed. Walk through the apparatus · drag to rotate · pinch to zoom.';
  septBtn.style.display='block';
}
function toggleSept(){
  const target=placedAR||browserContent; if(!target) return;
  if(septGroup){ target.remove(septGroup); septGroup=null; septBtn.textContent='＋ Sept 1933 contrast'; }
  else { septGroup=makeSept(); target.add(septGroup); septBtn.textContent='－ hide Sept contrast'; }
}

function render(_,frame){
  if(frame){
    const refSpace=renderer.xr.getReferenceSpace(), session=renderer.xr.getSession();
    if(!hitTestSourceRequested){
      hitTestSourceRequested=true;
      session.requestReferenceSpace('viewer').then(vs=>session.requestHitTestSource({space:vs})).then(s=>hitTestSource=s);
      session.addEventListener('end',()=>{hitTestSourceRequested=false;hitTestSource=null;});
    }
    if(hitTestSource){
      const hits=frame.getHitTestResults(hitTestSource);
      if(hits.length && !placedAR){ reticle.visible=true; reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix); }
      else reticle.visible=false;
    }
  } else if(controls){ controls.update(); }
  renderer.render(scene,camera);
}

// ── AR framing gestures: 1-finger drag = rotate, pinch = zoom the placed content (clean screencasts) ──
let _rx=null,_pinch=null,_bRot=0,_bScale=1;
function arObj(){ return (renderer && renderer.xr.isPresenting && placedAR) ? placedAR : null; }
function _td(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
addEventListener('touchstart',e=>{ const o=arObj(); if(!o) return;
  if(e.touches.length===1){ _rx=e.touches[0].clientX; _bRot=o.rotation.y; _pinch=null; }
  else if(e.touches.length>=2){ _pinch=_td(e.touches); _bScale=o.scale.x; _rx=null; } },{passive:true});
addEventListener('touchmove',e=>{ const o=arObj(); if(!o) return;
  if(e.touches.length===1 && _rx!=null){ o.rotation.y=_bRot+(e.touches[0].clientX-_rx)*0.01; }
  else if(e.touches.length>=2 && _pinch!=null){ o.scale.setScalar(Math.max(0.2,Math.min(6,_bScale*_td(e.touches)/_pinch))); } },{passive:true});
addEventListener('touchend',()=>{ _rx=null; _pinch=null; },{passive:true});
</script>
</body>
</html>
