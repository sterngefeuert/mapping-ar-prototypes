<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>P2 — Bildstatistik in place (WebXR)</title>
<!--
  P2 in WebXR — ISOTYPE/Bildstatistik apparatus of the 14 May 1933 rally, placed at 1:1.
  Stack: three.js + ARButton + hit-test (tap to place). Android Chrome (ARCore) only.

  Honesty conventions carried over from the flat sketch (index.html) and BRIEF.md:
    - One pictogram = one VERIFIED thing (Ganahl 2024). Machinery, not magnitude.
    - Attendance on 14 May is a DELIBERATE BLANK — the empty parterre you stand in.
    - The September 1933 Catholic Mass (48 distributed loudspeakers) is a toggle,
      shown only when explicitly labelled a DIFFERENT EVENT. Its ~300,000 crowd is
      intentionally NOT rendered as a walkable field (that would re-stage spectacle).
  Placement is tap-to-surface, NOT geo-anchored to the real parterre.
-->
<style>
  html,body{margin:0;height:100%;background:#000;color:#e9e3d5;font:14px/1.5 -apple-system,system-ui,sans-serif;overflow:hidden}
  #overlay{position:fixed;inset:0;pointer-events:none;z-index:5}
  #panel{position:absolute;left:12px;right:12px;top:12px;background:rgba(20,18,16,.66);padding:10px 12px;border-radius:8px}
  #panel b{color:#c98}
  #hint{position:absolute;left:12px;right:12px;bottom:92px;text-align:center;background:rgba(20,18,16,.6);padding:8px 12px;border-radius:8px}
  #septBtn{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;display:none;pointer-events:auto;
           background:#5d7382;color:#e9e3d5;border:none;border-radius:6px;padding:10px 16px;font:600 14px system-ui}
  .warn{color:#ffc266}
</style>
</head>
<body>
<div id="overlay">
  <div id="panel"><b>Bildstatistik in place</b> — <span id="msg">checking…</span></div>
  <button id="septBtn">＋ Sept 1933 contrast</button>
  <div id="hint" hidden>Point at the ground, tap to place the apparatus at 1:1. Walk among it.</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

const msg = document.getElementById('msg');
const hint = document.getElementById('hint');
const overlay = document.getElementById('overlay');
const septBtn = document.getElementById('septBtn');

const PAPER='#e9e3d5', INK='#2a2723', BRICK='#9b3a2e', STEEL='#5d7382', GHOST='#b3ab99';

// ISOTYPE symbols (Arntz-inspired), as [innerSVG, vbW, vbH]
const SYM = {
  person:['<circle cx="10" cy="5" r="4.4"/><path d="M10 10C5.5 10 4 13 4 18L4 30 7.5 30 7.5 21 12.5 21 12.5 30 16 30 16 18C16 13 14.5 10 10 10Z"/>',20,30],
  mic:['<rect x="6" y="2" width="8" height="13" rx="4"/><rect x="9.2" y="15" width="1.6" height="9"/><rect x="4" y="24" width="12" height="2.4" rx="1.2"/>',20,30],
  camera:[`<circle cx="9" cy="6" r="4.2"/><circle cx="19" cy="6" r="4.2"/><rect x="4" y="12" width="20" height="13" rx="1.5"/><rect x="24" y="15" width="6" height="7"/><circle cx="14" cy="18.5" r="3.4" fill="${PAPER}"/>`,32,30],
  truck:['<path d="M2 6 24 6 24 21 2 21Z"/><path d="M24 11 31 11 36 16 36 21 24 21Z"/><circle cx="9" cy="24" r="3.6"/><circle cx="30" cy="24" r="3.6"/>',38,30],
  radio:[`<line x1="20" y1="11" x2="26" y2="2" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="11" width="20" height="15" rx="1.5"/><circle cx="9" cy="18.5" r="3.2" fill="${PAPER}"/><rect x="15" y="14" width="5" height="9" fill="${PAPER}"/>`,28,30],
  speaker:['<path d="M3 11 9 11 18 4 18 26 9 19 3 19Z"/><path d="M20 9Q24 15 20 21" fill="none" stroke="currentColor" stroke-width="1.6"/>',24,30],
};

let renderer, scene, camera, reticle, controller;
let hitTestSource=null, hitTestSourceRequested=false;
let root=null, septGroup=null;

if (!('xr' in navigator)) msg.innerHTML='<span class="warn">WebXR unavailable. Open in Android Chrome (ARCore). iOS Safari is not supported.</span>';
else navigator.xr.isSessionSupported('immersive-ar').then(ok =>
  ok ? init() : (msg.innerHTML='<span class="warn">immersive-ar not supported here. Use Android Chrome (ARCore).</span>'));

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 60);
  scene.add(new THREE.HemisphereLight(0xffffff,0x99a,1.3));
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(devicePixelRatio); renderer.setSize(innerWidth,innerHeight); renderer.xr.enabled=true;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:overlay}}));
  msg.textContent='tap “Start AR”.';

  const ring=new THREE.RingGeometry(0.07,0.09,32).rotateX(-Math.PI/2);
  reticle=new THREE.Mesh(ring,new THREE.MeshBasicMaterial({color:0x9b3a2e}));
  reticle.matrixAutoUpdate=false; reticle.visible=false; scene.add(reticle);

  controller=renderer.xr.getController(0);
  controller.addEventListener('select',onSelect); scene.add(controller);
  septBtn.addEventListener('click',toggleSept);

  renderer.xr.addEventListener('sessionstart',()=>{hint.hidden=false;msg.textContent='AR active.';});
  renderer.xr.addEventListener('sessionend',()=>{hint.hidden=true;hitTestSourceRequested=false;hitTestSource=null;septBtn.style.display='none';});
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  renderer.setAnimationLoop(render);
}

// ── pictogram sprite (billboard) from an SVG symbol, sized to a real-world height ──
function pictoSprite(symKey, color, heightM, opacity=1){
  const [inner,w,h]=SYM[symKey];
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w*8}" height="${h*8}" viewBox="0 0 ${w} ${h}" fill="${color}" color="${color}">${inner}</svg>`;
  const tex=new THREE.Texture(); tex.colorSpace=THREE.SRGBColorSpace;
  const img=new Image();
  img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);tex.image=c;tex.needsUpdate=true;};
  img.src='data:image/svg+xml;base64,'+btoa(svg);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity,depthWrite:false}));
  sp.scale.set(heightM*w/h, heightM, 1);
  return sp;
}
function labelSprite(text, heightM=0.16, fg='#e9e3d5', bg='rgba(20,18,16,.82)'){
  const f=44,pad=18,c=document.createElement('canvas'),x=c.getContext('2d');
  x.font=`600 ${f}px Helvetica,Arial,sans-serif`;
  const w=Math.ceil(x.measureText(text).width)+pad*2,h=f+pad*2; c.width=w;c.height=h;
  x.font=`600 ${f}px Helvetica,Arial,sans-serif`; x.fillStyle=bg;
  rr(x,0,0,w,h,14); x.fill(); x.fillStyle=fg; x.textBaseline='middle'; x.fillText(text,pad,h/2+2);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(heightM*w/h,heightM,1); return sp;
}
function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function at(obj,x,y,z){obj.position.set(x,y,z);return obj;}

// ── the 1:1 field (local origin = tapped point on the ground) ──
function makeContent(){
  const g=new THREE.Group();
  // title
  g.add(at(labelSprite('Türkenbefreiungsfeier · 14 May 1933 · the apparatus',0.18),0,1.95,-1.6));

  // 6 microphones on the terrace (verified), brick, 1.3 m on stands
  for(let i=0;i<6;i++) g.add(at(pictoSprite('mic',BRICK,1.3),-1.5+i*0.6,0.65,-1.6));
  g.add(at(labelSprite('6 microphones — verified',0.12,'#e9e3d5','rgba(155,58,46,.85)'),0,1.45,-1.6));

  // presumed central speaker pair — undocumented, faded
  g.add(at(pictoSprite('speaker',GHOST,0.95,0.45),-0.6,0.48,-2.5));
  g.add(at(pictoSprite('speaker',GHOST,0.95,0.45), 0.6,0.48,-2.5));
  g.add(at(labelSprite('presumed central PA — undocumented',0.1,'#2a2723','rgba(179,171,153,.9)'),0,0.95,-2.5));

  // recording / broadcast machinery (verified), to the side
  g.add(at(pictoSprite('camera',BRICK,1.2),2.3,0.6,-1.3));   // Fox Movietone (Bell & Howell 2709)
  g.add(at(pictoSprite('truck',BRICK,1.9),3.1,0.95,-2.3));   // Selenophon optical-sound truck
  g.add(at(pictoSprite('radio',BRICK,0.9),2.5,0.45,-2.1));   // RAVAG radio line
  g.add(at(labelSprite('camera · sound truck · radio line — verified',0.1),2.7,1.7,-1.9));

  // the deliberate blank: attendance on 14 May (the parterre in front of you)
  g.add(at(labelSprite('Attendance, 14 May — left blank by choice',0.14,'#2a2723','rgba(233,227,213,.92)'),0,1.0,0.8));
  g.add(at(labelSprite('you stand in the count that was never made',0.1,'#6c6655','rgba(233,227,213,.85)'),0,0.7,0.8));

  return g;
}

// September 1933 Catholic Mass — DIFFERENT EVENT, apparatus contrast only
function makeSept(){
  const g=new THREE.Group();
  g.add(at(labelSprite('DIFFERENT EVENT — 10 Sept 1933 Catholic Mass',0.16,'#e9e3d5','rgba(93,115,130,.92)'),0,2.1,-5));
  // 48 distributed loudspeakers, steel, smaller, two rows receding
  for(let i=0;i<48;i++){
    const row=Math.floor(i/24), k=i%24;
    g.add(at(pictoSprite('speaker',STEEL,0.5),-4.6+k*0.4,0.25,-4.5-row*0.7));
  }
  g.add(at(labelSprite('48 distributed loudspeakers — verified (a different event)',0.1,'#e9e3d5','rgba(93,115,130,.85)'),0,0.8,-5));
  g.add(at(labelSprite('≈300,000 attendance NOT rendered — counting it would re-stage spectacle',0.1,'#2a2723','rgba(233,227,213,.9)'),0,1.4,-5));
  return g;
}

function onSelect(){
  if(root || !reticle.visible) return;            // place once
  root=makeContent();
  root.position.setFromMatrixPosition(reticle.matrix);
  root.rotation.y=new THREE.Euler().setFromRotationMatrix(reticle.matrix).y;
  scene.add(root);
  hint.textContent='Apparatus placed at 1:1. Walk among it. The parterre in front is the blank.';
  septBtn.style.display='block';
}
function toggleSept(){
  if(!root) return;
  if(septGroup){ root.remove(septGroup); septGroup.traverse(o=>o.material&&o.material.dispose&&o.material.dispose()); septGroup=null; septBtn.textContent='＋ Sept 1933 contrast'; }
  else { septGroup=makeSept(); root.add(septGroup); septBtn.textContent='－ hide Sept contrast'; }
}

function render(_,frame){
  if(frame){
    const refSpace=renderer.xr.getReferenceSpace(), session=renderer.xr.getSession();
    if(!hitTestSourceRequested){
      hitTestSourceRequested=true;
      session.requestReferenceSpace('viewer').then(vs=>session.requestHitTestSource({space:vs})).then(s=>hitTestSource=s);
      session.addEventListener('end',()=>{hitTestSourceRequested=false;hitTestSource=null;});
    }
    if(hitTestSource){
      const hits=frame.getHitTestResults(hitTestSource);
      if(hits.length && !root){ reticle.visible=true; reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix); }
      else reticle.visible=false;
    }
  }
  renderer.render(scene,camera);
}
</script>
</body>
</html>
