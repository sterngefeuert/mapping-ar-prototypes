<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>WebXR AR template — tap to place</title>
<!--
  REUSABLE WEBXR TEMPLATE — the "place content in AR" shell every prototype starts from.
  Stack: three.js + ARButton + WebXR hit-test (the canonical Android-Chrome AR recipe).
  Placement: TAP TO PLACE on a detected surface (hit-test reticle). NOT geo-anchored to a
  real coordinate — true on-site pinning needs ARCore Geospatial (prat-ar), out of scope here.
  Works: Android + Chrome (ARCore). Does NOT work: iOS Safari (no immersive-ar as of 2026).

  TO MAKE A NEW PROTOTYPE: copy this file and replace makeContent() (and preload assets in
  buildAssets()). Everything else — session, reticle, hit-test, placement — stays the same.
-->
<style>
  html,body{margin:0;height:100%;background:#000;color:#eee;font:14px/1.5 -apple-system,system-ui,sans-serif;overflow:hidden}
  #overlay{position:fixed;inset:0;pointer-events:none;z-index:5}
  #panel{position:absolute;left:12px;right:12px;top:12px;background:rgba(0,0,0,.62);
         padding:10px 12px;border-radius:8px;pointer-events:none}
  #panel b{color:#7cc4ff}
  #hint{position:absolute;left:12px;right:12px;bottom:90px;text-align:center;
        background:rgba(0,0,0,.55);padding:8px 12px;border-radius:8px}
  .warn{color:#ffc266}
</style>
</head>
<body>
<div id="overlay">
  <div id="panel"><b>WebXR AR template</b> — <span id="msg">checking…</span></div>
  <div id="hint" hidden>Point the phone at the floor, then tap to place. Walk around it.</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

const msg = document.getElementById('msg');
const hint = document.getElementById('hint');
const overlay = document.getElementById('overlay');

let renderer, scene, camera, reticle, controller;
let hitTestSource = null, hitTestSourceRequested = false;

// ── Capability gate ──────────────────────────────────────────────────────────
if (!('xr' in navigator)) {
  msg.innerHTML = '<span class="warn">WebXR unavailable. Open in Android Chrome (ARCore). iOS Safari is not supported.</span>';
} else {
  navigator.xr.isSessionSupported('immersive-ar').then(ok => {
    if (ok) init();
    else msg.innerHTML = '<span class="warn">immersive-ar not supported here. Use Android Chrome (ARCore).</span>';
  });
}

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 40);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x99a, 1.3));
  const dir = new THREE.DirectionalLight(0xffffff, 0.85); dir.position.set(0.4,1,0.3); scene.add(dir);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: overlay }
  }));
  msg.textContent = 'tap “Start AR” below.';

  const ring = new THREE.RingGeometry(0.07, 0.09, 32).rotateX(-Math.PI/2);
  reticle = new THREE.Mesh(ring, new THREE.MeshBasicMaterial({ color: 0x7cc4ff }));
  reticle.matrixAutoUpdate = false; reticle.visible = false; scene.add(reticle);

  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  buildAssets();

  renderer.xr.addEventListener('sessionstart', () => { hint.hidden = false; msg.textContent = 'AR active.'; });
  renderer.xr.addEventListener('sessionend',   () => { hint.hidden = true; hitTestSourceRequested = false; hitTestSource = null; });

  addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  renderer.setAnimationLoop(render);
}

function onSelect() {
  if (!reticle.visible) return;
  const content = makeContent();
  content.position.setFromMatrixPosition(reticle.matrix);
  const e = new THREE.Euler().setFromRotationMatrix(reticle.matrix);
  content.rotation.y = e.y;                    // keep upright, inherit yaw only
  scene.add(content);
  hint.textContent = 'Placed — walk around it. Tap again to place another.';
}

function render(_, frame) {
  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();
    if (!hitTestSourceRequested) {
      hitTestSourceRequested = true;
      session.requestReferenceSpace('viewer')
        .then(vs => session.requestHitTestSource({ space: vs }))
        .then(src => { hitTestSource = src; });
      session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; });
    }
    if (hitTestSource) {
      const hits = frame.getHitTestResults(hitTestSource);
      if (hits.length) {
        reticle.visible = true;
        reticle.matrix.fromArray(hits[0].getPose(refSpace).transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }
  renderer.render(scene, camera);
}

// ── SWAP THESE TWO FOR A REAL PROTOTYPE ───────────────────────────────────────
function buildAssets() { /* preload textures/audio here */ }

function makeContent() {
  // Placeholder: a small cube sitting on the placement point.
  const grp = new THREE.Group();
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.18, 0.18),
    new THREE.MeshStandardMaterial({ color: 0x7cc4ff })
  );
  cube.position.y = 0.09;
  grp.add(cube);
  return grp;
}
</script>
</body>
</html>
